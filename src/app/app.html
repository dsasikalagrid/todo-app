<h1>To-Do</h1>

<div class="row p-3">
  <div class="col-6">
    <input [(ngModel)]="task" type="text" #name = "ngModel" required />
    <div class="text-danger">
      @if(name.errors?.['required'] && name.touched) {
        <span >this field is required</span>
      }
    </div>
    <button (click)="addTasks()" type="button" class="btn btn-success mt-5" [disabled] = name.invalid>add task</button>
  </div>
</div>

<div class="row p-5">
  <div class="col-6">
  <h3>task list</h3>
    <table class="table table-bordered">
      <thead>
        <tr>
          <th>id</th>
          <th>name</th>
          <th>date</th>
        </tr>
      </thead>
      <tbody>
        @for (item of tasksList; track item.id) {
          <tr>
            <td>{{ item.id }}</td>
            <td>{{ item.name }}</td>
            <td>{{ item.date | date: 'dd-MM-yyyy HH-mm' }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
